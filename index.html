<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0">
<title>Claynosaurz</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f0f;
    font-family: monospace;
    color: #e8f5f0;
    width: 240px;
    height: 240px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #carousel {
    width: 240px;
    height: 240px;
    position: relative;
    overflow: hidden;
    background: #0a0f0f;
  }

  .header-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 26px;
    background: rgba(10,15,15,0.92);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    z-index: 20;
    border-bottom: 1px solid #0F6E56;
  }

  .brand {
    font-size: 10px;
    color: #1D9E75;
    letter-spacing: 3px;
    font-weight: bold;
  }

  .counter {
    font-size: 10px;
    color: #5DCAA5;
  }

  #slides-container {
    position: absolute;
    inset: 0;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 26px;
    padding-bottom: 28px;
    background: #0a0f0f;
  }

  .slide.active { opacity: 1; }

  .slide img {
    width: 182px;
    height: 182px;
    object-fit: cover;
    border-radius: 6px;
    border: 2px solid #1D9E75;
    display: block;
  }

  .slide-name {
    position: absolute;
    bottom: 30px;
    left: 0; right: 0;
    text-align: center;
    font-size: 10px;
    color: #9FE1CB;
    letter-spacing: 1px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 8px;
  }

  .dots {
    position: absolute;
    bottom: 8px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 5px;
    z-index: 20;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #0F6E56;
    transition: background 0.4s;
    flex-shrink: 0;
  }

  .dot.active { background: #1D9E75; }

  #status {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    color: #5DCAA5;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid #0F6E56;
    border-top-color: #1D9E75;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: #D85A30;
    font-size: 11px;
    text-align: center;
    padding: 0 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="carousel">
  <div class="header-bar">
    <span class="brand">CLAYNOSAURZ</span>
    <span class="counter" id="counter"></span>
  </div>

  <div id="status">
    <div class="spinner"></div>
    <span>loading dinos...</span>
  </div>

  <div id="slides-container"></div>
  <div class="dots" id="dots"></div>
</div>

<script>
  // !! Replace this with your Cloudflare Worker URL after deploying !!
  const PROXY_URL = 'https://YOUR_WORKER.YOUR_SUBDOMAIN.workers.dev';

  const KEYWORDS = ['claynosaurz', 'call of saga', 'call-of-saga', 'clayno'];
  const INTERVAL = 5000;
  const MAX_DOTS = 12;

  let nfts    = [];
  let current = 0;

  async function fetchWalletNFTs() {
    const res = await fetch(PROXY_URL);
    if (!res.ok) throw new Error(`proxy ${res.status}`);
    return res.json();
  }

  function matchesCollection(token) {
    const fields = [
      token.collection      || '',
      token.name            || '',
      token.symbol          || '',
      token.updateAuthority || ''
    ].join(' ').toLowerCase();
    return KEYWORDS.some(k => fields.includes(k));
  }

  function buildSlides() {
    const container = document.getElementById('slides-container');
    const dotsEl    = document.getElementById('dots');
    container.innerHTML = '';
    dotsEl.innerHTML    = '';

    nfts.forEach((nft, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide' + (i === 0 ? ' active' : '');

      const img   = document.createElement('img');
      img.alt     = nft.name;
      img.src     = nft.image;
      img.onerror = () => {
        img.src = `https://placehold.co/182x182/0a0f0f/1D9E75?text=${encodeURIComponent(nft.name.slice(0,8))}`;
      };

      const nameEl = document.createElement('div');
      nameEl.className   = 'slide-name';
      nameEl.textContent = nft.name;

      slide.append(img, nameEl);
      container.appendChild(slide);

      if (nfts.length <= MAX_DOTS) {
        const dot = document.createElement('div');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dotsEl.appendChild(dot);
      }
    });
  }

  function goTo(index) {
    document.querySelectorAll('.slide').forEach((s, i) =>
      s.classList.toggle('active', i === index));
    document.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === index));
    document.getElementById('counter').textContent = `${index + 1} / ${nfts.length}`;
  }

  function startCycle() {
    if (nfts.length < 2) return;
    setInterval(() => {
      current = (current + 1) % nfts.length;
      goTo(current);
    }, INTERVAL);
  }

  async function init() {
    try {
      const all      = await fetchWalletNFTs();
      const filtered = all.filter(matchesCollection);

      if (filtered.length === 0) {
        showError('No Claynosaurz found\nin this wallet.');
        return;
      }

      nfts = filtered.map(t => ({
        name:  t.name  || 'Claynosaurz',
        image: t.image || t.animationUrl || ''
      }));

      document.getElementById('status').style.display = 'none';
      buildSlides();
      goTo(0);
      startCycle();

    } catch (err) {
      showError(`Fetch error:\n${err.message}`);
    }
  }

  function showError(msg) {
    document.getElementById('status').innerHTML =
      `<div class="error-msg">${msg.replace(/\n/g,'<br>')}</div>`;
  }

  init();
</script>
</body>
</html>
